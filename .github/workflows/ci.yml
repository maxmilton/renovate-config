name: ci

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.label || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENOVATE_PLATFORM: local
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 26
      - run: npm install -g renovate@latest
      - run: renovate-config-validator --strict
      - run: renovate-config-validator --strict default.json
      - run: renovate-config-validator --strict auto.json
